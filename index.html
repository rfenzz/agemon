<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#EF3B36">
<title>AGE.MON Kasir</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#EF3B36; --red-dark:#C92B27; --ink:#171314; --paper:#FFFBF2;
    --card:#FFFFFF; --line:#E9E2D5; --muted:#8A8378; --green:#1E9E58;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{height:100%}
  body{
    min-height:100%;
    font-family:'Plus Jakarta Sans',system-ui,sans-serif;
    background:var(--paper); color:var(--ink);
    max-width:480px; margin:0 auto;
    padding-bottom:calc(150px + env(safe-area-inset-bottom));
  }
  /* ---------- Header ---------- */
  header{
    background:var(--red); color:#fff; padding:14px 16px 12px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:20;
  }
  .brand{font-weight:800; font-size:20px; letter-spacing:.5px; font-style:italic}
  .brand span{opacity:.85; font-weight:700; font-size:11px; font-style:normal; display:block; letter-spacing:2px}
  .daytotal{text-align:right}
  .daytotal small{display:block; font-size:10px; letter-spacing:1.5px; opacity:.85; font-weight:700}
  .daytotal b{font-size:16px; font-weight:800}
  /* ---------- Tabs ---------- */
  nav{display:flex; background:var(--ink); position:sticky; top:58px; z-index:19}
  nav button{
    flex:1; padding:11px 0; background:none; border:0; color:#fff; opacity:.5;
    font:700 12px 'Plus Jakarta Sans',sans-serif; letter-spacing:2px; cursor:pointer;
  }
  nav button.on{opacity:1; box-shadow:inset 0 -3px 0 var(--red)}
  /* ---------- Menu grid ---------- */
  #menuGrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:14px}
  .item{
    background:var(--card); border:2px solid var(--line); border-radius:14px;
    padding:14px 12px 12px; text-align:left; cursor:pointer; position:relative;
    transition:transform .06s ease, border-color .15s;
    font-family:inherit;
  }
  .item:active{transform:scale(.97)}
  .item.picked{border-color:var(--red)}
  .item h3{font-size:15px; font-weight:800; line-height:1.2}
  .item p{font-size:13px; color:var(--muted); font-weight:700; margin-top:4px}
  .dot{width:10px; height:10px; border-radius:50%; display:inline-block; margin-bottom:8px}
  .cat{
    grid-column:1/-1; font:800 11px 'Plus Jakarta Sans'; letter-spacing:3px;
    color:var(--muted); padding:6px 2px 0; display:flex; align-items:center; gap:10px;
  }
  .cat::after{content:''; flex:1; border-top:2px solid var(--line)}
  .promobtn{
    width:100%; margin:10px 0 2px; height:44px; border-radius:10px;
    border:2px dashed var(--red); background:none; color:var(--red);
    font:800 12px 'Plus Jakarta Sans'; letter-spacing:.5px; cursor:pointer;
  }
  .promobtn.on{background:var(--red); color:#fff; border-style:solid}
  .qtybadge{
    position:absolute; top:-8px; right:-6px; min-width:26px; height:26px; border-radius:13px;
    background:var(--red); color:#fff; font-weight:800; font-size:13px;
    display:flex; align-items:center; justify-content:center; padding:0 6px;
    box-shadow:0 2px 6px rgba(239,59,54,.4);
  }
  .stepper{display:flex; gap:6px; margin-top:10px}
  .stepper button{
    flex:1; height:34px; border-radius:9px; border:2px solid var(--line); background:var(--paper);
    font:800 18px 'Plus Jakarta Sans'; color:var(--ink); cursor:pointer;
  }
  .stepper button:active{background:var(--line)}
  /* ---------- Pay bar ---------- */
  #paybar{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:480px;
    padding:12px 14px calc(16px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent, var(--paper) 30%);
    z-index:30;
  }
  #payBtn{
    width:100%; height:60px; border:0; border-radius:16px; background:var(--ink); color:#fff;
    font:800 17px 'Plus Jakarta Sans'; letter-spacing:.5px; cursor:pointer;
    display:flex; align-items:center; justify-content:space-between; padding:0 20px;
    box-shadow:0 6px 18px rgba(23,19,20,.25);
  }
  #payBtn:disabled{opacity:.35}
  #payBtn b{font-size:19px}
  /* ---------- Checkout sheet (receipt style) ---------- */
  #overlay{
    position:fixed; inset:0; background:rgba(23,19,20,.55); z-index:40;
    display:none; align-items:flex-end; justify-content:center;
  }
  #overlay.show{display:flex}
  #sheet{
    width:100%; max-width:480px; max-height:92vh; overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    background:transparent; padding:10px 14px calc(0px + env(safe-area-inset-bottom));
  }
  .ticket{
    background:#fff; font-family:'Space Mono',monospace; font-size:13px;
    padding:20px 18px 26px; border-radius:10px 10px 0 0;
    box-shadow:0 -8px 30px rgba(0,0,0,.3);
    /* perforated zigzag bottom — this sheet IS the receipt */
    clip-path:polygon(0 0,100% 0,100% calc(100% - 8px),
      97.5% 100%,95% calc(100% - 8px),92.5% 100%,90% calc(100% - 8px),87.5% 100%,
      85% calc(100% - 8px),82.5% 100%,80% calc(100% - 8px),77.5% 100%,75% calc(100% - 8px),
      72.5% 100%,70% calc(100% - 8px),67.5% 100%,65% calc(100% - 8px),62.5% 100%,
      60% calc(100% - 8px),57.5% 100%,55% calc(100% - 8px),52.5% 100%,50% calc(100% - 8px),
      47.5% 100%,45% calc(100% - 8px),42.5% 100%,40% calc(100% - 8px),37.5% 100%,
      35% calc(100% - 8px),32.5% 100%,30% calc(100% - 8px),27.5% 100%,25% calc(100% - 8px),
      22.5% 100%,20% calc(100% - 8px),17.5% 100%,15% calc(100% - 8px),12.5% 100%,
      10% calc(100% - 8px),7.5% 100%,5% calc(100% - 8px),2.5% 100%,0 calc(100% - 8px));
  }
  .ticket h2{font-family:'Plus Jakarta Sans'; font-weight:800; font-style:italic; text-align:center; font-size:20px}
  .ticket .sub{text-align:center; font-size:11px; color:var(--muted); margin-bottom:8px}
  .rule{border-top:2px dashed #ccc; margin:8px 0}
  .row{display:flex; justify-content:space-between; gap:8px; padding:2px 0}
  .row.total{font-weight:700; font-size:16px}
  .paykind{display:flex; gap:8px; margin:12px 0; font-family:'Plus Jakarta Sans'}
  .paykind button{
    flex:1; height:46px; border-radius:10px; border:2px solid var(--line); background:#fff;
    font:800 14px 'Plus Jakarta Sans'; color:var(--muted); cursor:pointer;
  }
  .paykind button.on{border-color:var(--ink); background:var(--ink); color:#fff}
  .cashquick{display:flex; gap:8px; margin-bottom:10px; font-family:'Plus Jakarta Sans'}
  .cashquick button{
    flex:1; height:40px; border-radius:10px; border:2px solid var(--line); background:#fff;
    font:700 12px 'Plus Jakarta Sans'; cursor:pointer;
  }
  #cashIn{
    width:100%; height:50px; border:2px solid var(--line); border-radius:10px;
    font:700 18px 'Space Mono'; text-align:right; padding:0 14px; background:#fff; color:var(--ink);
  }
  #cashIn:focus{outline:none; border-color:var(--ink)}
  .kembali{color:var(--green); font-weight:700}
  .kurang{color:var(--red); font-weight:700}
  #confirmBtn{
    width:100%; height:58px; margin-top:14px; border:0; border-radius:14px;
    background:var(--red); color:#fff; font:800 16px 'Plus Jakarta Sans'; letter-spacing:.5px; cursor:pointer;
  }
  #confirmBtn:disabled{opacity:.4}
  #cancelBtn{width:100%; padding:14px 0 22px; background:none; border:0; color:#fff; font:700 13px 'Plus Jakarta Sans'; cursor:pointer}
  /* ---------- History ---------- */
  #histWrap{padding:14px; display:none}
  .histcard{background:var(--card); border:2px solid var(--line); border-radius:14px; padding:14px; margin-bottom:10px}
  .histcard .top{display:flex; justify-content:space-between; font-weight:800; font-size:14px}
  .histcard .top .m{color:var(--muted); font-weight:700; font-size:12px}
  .histcard ul{list-style:none; margin-top:6px; color:var(--muted); font-size:13px; font-weight:500}
  .histcard .reprint{margin-top:10px; height:36px; padding:0 14px; border-radius:9px; border:2px solid var(--line); background:var(--paper); font:700 12px 'Plus Jakarta Sans'; cursor:pointer}
  .summary{background:var(--ink); color:#fff; border-radius:14px; padding:16px; margin-bottom:12px}
  .summary .row{font-size:13px}
  .summary .big{font-size:22px; font-weight:800}
  .ghostbtn{width:100%; height:44px; border-radius:12px; border:2px dashed var(--muted); background:none; font:700 13px 'Plus Jakarta Sans'; color:var(--muted); cursor:pointer; margin-top:6px}
  .empty{text-align:center; color:var(--muted); font-weight:700; padding:40px 0}
  .toast{
    position:fixed; left:50%; transform:translateX(-50%); bottom:110px; z-index:60;
    background:var(--ink); color:#fff; padding:12px 18px; border-radius:12px;
    font:700 13px 'Plus Jakarta Sans'; box-shadow:0 6px 18px rgba(0,0,0,.3);
    opacity:0; pointer-events:none; transition:opacity .25s;
  }
  .toast.show{opacity:1}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important} }
</style>
</head>
<body>

<header>
  <div class="brand">AGE.MON<span>KASIR</span></div>
  <div class="daytotal"><small>HARI INI</small><b id="hdrTotal">Rp 0</b></div>
</header>

<nav>
  <button id="tabKasir" class="on">KASIR</button>
  <button id="tabRiwayat">RIWAYAT</button>
</nav>

<div id="menuGrid"></div>

<div id="histWrap"></div>

<div id="paybar">
  <button id="payBtn" disabled><span id="payCount">0 item</span><b id="payTotal">Rp 0</b></button>
</div>

<!-- Checkout sheet -->
<div id="overlay">
  <div id="sheet">
    <div class="ticket">
      <h2>AGE.MON</h2>
      <div class="sub">Struk Pembayaran</div>
      <div class="rule"></div>
      <div id="ticketLines"></div>
      <button id="promoBtn" class="promobtn"></button>
      <div class="row" id="discountRow" style="display:none"><span>BUY2-SECOND50%</span><span id="discountOut" class="kembali"></span></div>
      <div class="rule"></div>
      <div class="row total"><span>TOTAL</span><span id="ticketTotal"></span></div>
      <div class="paykind">
        <button id="pkCash" class="on">TUNAI</button>
        <button id="pkQris">QRIS</button>
      </div>
      <div id="cashArea">
        <div class="cashquick">
          <button data-c="pas">UANG PAS</button>
          <button data-c="50000">50rb</button>
          <button data-c="100000">100rb</button>
        </div>
        <input id="cashIn" type="tel" inputmode="numeric" placeholder="Uang diterima">
        <div class="row" style="margin-top:8px"><span>Kembalian</span><span id="changeOut">—</span></div>
      </div>
      <button id="confirmBtn">BAYAR &amp; CETAK STRUK</button>
    </div>
    <button id="cancelBtn">✕ Batal</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   AGE.MON POS v1
   - Printing : RawBT (rawbt:base64,<ESC/POS>) — install RawBT
     on the cashier phone & pair it once with the Iware C18BT.
   - Storage  : localStorage (with in-memory fallback).
   - Sync     : optional Supabase — fill in the 2 constants
     below and every sale is pushed to a `sales` table.
========================================================= */

const MENU = [
  { name:'Blueberry',        price:24000, dot:'#5B6DC8', cat:'MANIS' },
  { name:'Chocobanana',      price:24000, dot:'#E8B93C', cat:'MANIS' },
  { name:'Chococheese',      price:24000, dot:'#F2E3B8', cat:'MANIS' },
  { name:'Cocoa',            price:24000, dot:'#7A4A2B', cat:'MANIS' },
  { name:'Matcha',           price:24000, dot:'#7BA84C', cat:'MANIS' },
  { name:'Creme Brulee',     price:28000, dot:'#D98A2B', cat:'MANIS' },
  { name:'Bolognese Mozza',  price:28000, dot:'#C0392B', cat:'GURIH' },
  { name:'Triple Cheese',    price:28000, dot:'#F1C40F', cat:'GURIH' },
  { name:'Smoked Beef Mozza',price:28000, dot:'#8E5A3C', cat:'GURIH' },
  { name:'Beef Pizza',       price:28000, dot:'#D35400', cat:'GURIH' },
  { name:'Chicken Mushroom', price:28000, dot:'#A88B6A', cat:'GURIH' },
  { name:'Chicken Mayo',     price:28000, dot:'#EED9A2', cat:'GURIH' },
];

/* ---- Promo: BUY2-SECOND50% ----
   Min 2 pcs · potongan 50% pada 1 pcs termurah (harga sama/lebih murah)
   Syarat: customer post + tag + follow IG @agemon.id (kasir yang cek) */
const PROMO = { code:'BUY2-SECOND50%', label:'Beli 2, ke-2 diskon 50%' };

const STORE = {
  name    : 'AGE.MON',
  address : '',                          // ← alamat toko (opsional, tampil di struk)
  ig      : '@agemon.id',                // ← handle IG di footer struk
  footer  : 'Pembayaran tanpa STRUK = GRATIS',
};

/* ---- Supabase (opsional, v2) — biarkan kosong dulu ---- */
const SUPABASE_URL = '';
const SUPABASE_ANON_KEY = '';

/* ---------- safe storage (works even where localStorage fails) ---------- */
const mem = {};
const store = {
  get(k){ try{ return JSON.parse(localStorage.getItem(k)) ?? mem[k] ?? null }catch(e){ return mem[k] ?? null } },
  set(k,v){ mem[k]=v; try{ localStorage.setItem(k, JSON.stringify(v)) }catch(e){} },
};

/* ---------- state ---------- */
let cart = {};                    // name -> qty
let payMethod = 'TUNAI';
const todayKey = () => 'sales-' + new Date().toISOString().slice(0,10);

const rp = n => 'Rp ' + n.toLocaleString('id-ID');
const num = n => n.toLocaleString('id-ID');

/* ---------- menu grid ---------- */
const grid = document.getElementById('menuGrid');
function renderMenu(){
  grid.innerHTML = '';
  let lastCat = null;
  MENU.forEach(it=>{
    if(it.cat !== lastCat){
      lastCat = it.cat;
      const h = document.createElement('div');
      h.className = 'cat';
      h.textContent = it.cat;
      grid.appendChild(h);
    }
    const q = cart[it.name] || 0;
    const d = document.createElement('div');
    d.className = 'item' + (q ? ' picked':'');
    d.innerHTML = `
      ${q ? `<div class="qtybadge">${q}</div>`:''}
      <span class="dot" style="background:${it.dot}"></span>
      <h3>${it.name}</h3>
      <p>${rp(it.price)}</p>
      ${q ? `<div class="stepper">
               <button data-a="minus" data-n="${it.name}">−</button>
               <button data-a="plus"  data-n="${it.name}">+</button>
             </div>`:''}`;
    d.addEventListener('click', e=>{
      const a = e.target.dataset.a;
      if(a==='plus' || !a) cart[it.name]=(cart[it.name]||0)+1;
      if(a==='minus'){ cart[it.name]--; if(cart[it.name]<=0) delete cart[it.name]; }
      renderMenu(); renderPaybar();
    });
    grid.appendChild(d);
  });
}

/* ---------- pay bar ---------- */
const payBtn = document.getElementById('payBtn');
let promoOn = false;
function cartSubtotal(){ return Object.entries(cart).reduce((s,[n,q])=> s + MENU.find(m=>m.name===n).price*q, 0); }
function discountValue(){
  if(!promoOn || cartCount() < 2) return 0;
  // diskon 50% berlaku pada 1 pcs TERMURAH (aturan: item ke-2 harga sama/lebih murah)
  const pieces = [];
  Object.entries(cart).forEach(([n,q])=>{
    const p = MENU.find(m=>m.name===n).price;
    for(let i=0;i<q;i++) pieces.push(p);
  });
  pieces.sort((a,b)=>a-b);
  return Math.round(pieces[0] * 0.5);
}
function cartTotal(){ return cartSubtotal() - discountValue(); }
function cartCount(){ return Object.values(cart).reduce((s,q)=>s+q,0); }
function renderPaybar(){
  const c = cartCount();
  payBtn.disabled = !c;
  document.getElementById('payCount').textContent = c + ' item';
  document.getElementById('payTotal').textContent = rp(cartTotal());
}

/* ---------- checkout sheet ---------- */
const overlay = document.getElementById('overlay');
const cashIn = document.getElementById('cashIn');

payBtn.addEventListener('click', ()=>{
  promoOn = false;
  renderTicket();
  cashIn.value=''; updateChange();
  overlay.classList.add('show');
});

function renderTicket(){
  const lines = Object.entries(cart).map(([n,q])=>{
    const it = MENU.find(m=>m.name===n);
    return `<div class="row"><span>${n} ×${q}</span><span>${num(it.price*q)}</span></div>`;
  }).join('');
  document.getElementById('ticketLines').innerHTML = lines;
  const pb = document.getElementById('promoBtn');
  pb.style.display = cartCount() >= 2 ? 'block' : 'none';
  pb.classList.toggle('on', promoOn);
  pb.textContent = promoOn ? '✓ PROMO IG AKTIF — ke-2 50% off' : '🎁 PROMO IG — BUY2-SECOND50%';
  const d = discountValue();
  document.getElementById('discountRow').style.display = d ? 'flex' : 'none';
  document.getElementById('discountOut').textContent = '−' + num(d);
  document.getElementById('ticketTotal').textContent = num(cartTotal());
  updateChange();
}

document.getElementById('promoBtn').addEventListener('click', ()=>{
  promoOn = !promoOn;
  if(promoOn) toast('Cek dulu: customer sudah post + tag + follow @agemon.id?');
  renderTicket();
});
document.getElementById('cancelBtn').addEventListener('click', ()=> overlay.classList.remove('show'));

document.getElementById('pkCash').addEventListener('click', ()=> setPay('TUNAI'));
document.getElementById('pkQris').addEventListener('click', ()=> setPay('QRIS'));
function setPay(m){
  payMethod = m;
  document.getElementById('pkCash').classList.toggle('on', m==='TUNAI');
  document.getElementById('pkQris').classList.toggle('on', m==='QRIS');
  document.getElementById('cashArea').style.display = m==='TUNAI' ? 'block':'none';
  updateChange();
}

document.querySelectorAll('.cashquick button').forEach(b=>{
  b.addEventListener('click', ()=>{
    cashIn.value = b.dataset.c==='pas' ? cartTotal() : b.dataset.c;
    updateChange();
  });
});
cashIn.addEventListener('input', updateChange);

function cashValue(){ return parseInt((cashIn.value+'').replace(/\D/g,'')) || 0; }
function updateChange(){
  const out = document.getElementById('changeOut');
  const btn = document.getElementById('confirmBtn');
  if(payMethod==='QRIS'){ btn.disabled = false; return; }
  const diff = cashValue() - cartTotal();
  if(!cashIn.value){ out.textContent='—'; out.className=''; btn.disabled=true; }
  else if(diff < 0){ out.textContent='Kurang ' + num(-diff); out.className='kurang'; btn.disabled=true; }
  else { out.textContent = num(diff); out.className='kembali'; btn.disabled=false; }
}

/* ---------- confirm sale ---------- */
document.getElementById('confirmBtn').addEventListener('click', ()=>{
  const counter = (store.get('counter')||0) + 1;
  store.set('counter', counter);
  const sale = {
    id   : 'A-' + String(counter).padStart(4,'0'),
    time : new Date().toISOString(),
    items: Object.entries(cart).map(([n,q])=>({ name:n, qty:q, price:MENU.find(m=>m.name===n).price })),
    subtotal: cartSubtotal(),
    discount: discountValue(),
    promo: discountValue() > 0 ? PROMO.code : null,
    total: cartTotal(),
    method: payMethod,
    cash : payMethod==='TUNAI' ? cashValue() : null,
    change: payMethod==='TUNAI' ? cashValue()-cartTotal() : null,
    synced: false,
  };
  const sales = store.get(todayKey()) || [];
  sales.push(sale);
  store.set(todayKey(), sales);

  printSale(sale);
  syncSale(sale);

  cart = {}; renderMenu(); renderPaybar(); renderHeader();
  overlay.classList.remove('show');
  toast('Tersimpan ✓ Struk dikirim ke printer');
});

/* ---------- ESC/POS via RawBT ---------- */
const W = 32; // 58mm paper = 32 chars
const padLine = (l,r)=>{ l=String(l); r=String(r);
  const space = W - l.length - r.length;
  return l + ' '.repeat(Math.max(1,space)) + r; };
const center = t => ' '.repeat(Math.max(0, Math.floor((W-t.length)/2))) + t;

function buildReceipt(sale){
  const E = String.fromCharCode(27), G = String.fromCharCode(29);
  const d = new Date(sale.time);
  const dt = d.toLocaleDateString('id-ID') + ' ' +
             d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  let s = '';
  s += E+'@';                       // init
  s += E+'a'+String.fromCharCode(1);// center
  s += G+'!'+String.fromCharCode(17);// double width+height
  s += STORE.name + '\n';
  s += G+'!'+String.fromCharCode(0); // normal
  if(STORE.address) s += STORE.address + '\n';
  s += E+'a'+String.fromCharCode(0); // left
  s += '-'.repeat(W)+'\n';
  s += padLine(dt, '#'+sale.id)+'\n';
  s += '-'.repeat(W)+'\n';
  sale.items.forEach(it=>{
    s += it.name + '\n';
    s += padLine('  '+it.qty+' x '+num(it.price), num(it.qty*it.price))+'\n';
  });
  s += '-'.repeat(W)+'\n';
  if(sale.discount){
    s += padLine('SUBTOTAL', num(sale.subtotal))+'\n';
    s += padLine(sale.promo, '-'+num(sale.discount))+'\n';
  }
  s += E+'E'+String.fromCharCode(1); // bold on
  s += padLine('TOTAL', num(sale.total))+'\n';
  s += E+'E'+String.fromCharCode(0);
  if(sale.method==='TUNAI'){
    s += padLine('TUNAI', num(sale.cash))+'\n';
    s += padLine('KEMBALI', num(sale.change))+'\n';
  } else {
    s += padLine('BAYAR', 'QRIS')+'\n';
  }
  s += '-'.repeat(W)+'\n';
  s += E+'a'+String.fromCharCode(1);
  s += center('')+ STORE.footer + '\n';
  if(sale.promo) s += 'Promo IG: post+tag+follow\n';
  s += 'Terima kasih! ' + STORE.ig + '\n';
  s += '\n\n\n\n';                  // feed for tear-off
  return s;
}

function printSale(sale){
  const data = buildReceipt(sale);
  // rawbt: scheme → RawBT app pushes raw ESC/POS to the paired BT printer
  const b64 = btoa(unescape(encodeURIComponent(data)));
  window.location.href = 'rawbt:base64,' + b64;
}

/* ---------- optional Supabase sync ---------- */
async function syncSale(sale){
  if(!SUPABASE_URL || !SUPABASE_ANON_KEY) return;
  try{
    const r = await fetch(SUPABASE_URL + '/rest/v1/sales', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'apikey':SUPABASE_ANON_KEY,
        'Authorization':'Bearer '+SUPABASE_ANON_KEY,
      },
      body: JSON.stringify({
        sale_id:sale.id, time:sale.time, items:sale.items,
        subtotal:sale.subtotal, discount:sale.discount, promo:sale.promo,
        total:sale.total, method:sale.method,
      }),
    });
    if(r.ok){
      const sales = store.get(todayKey()) || [];
      const f = sales.find(x=>x.id===sale.id); if(f) f.synced=true;
      store.set(todayKey(), sales);
    }
  }catch(e){ /* offline — stays queued, retried on reload */ }
}
function retryQueue(){
  (store.get(todayKey())||[]).filter(s=>!s.synced).forEach(syncSale);
}

/* ---------- history tab ---------- */
const histWrap = document.getElementById('histWrap');
function renderHistory(){
  const sales = store.get(todayKey()) || [];
  const total = sales.reduce((s,x)=>s+x.total,0);
  const cash  = sales.filter(x=>x.method==='TUNAI').reduce((s,x)=>s+x.total,0);
  const qris  = total - cash;
  const disc  = sales.reduce((s,x)=>s+(x.discount||0),0);
  const perFlavor = {};
  sales.forEach(s=>s.items.forEach(it=> perFlavor[it.name]=(perFlavor[it.name]||0)+it.qty));

  let html = `<div class="summary">
      <div class="row"><span>Penjualan hari ini</span><span>${sales.length} transaksi</span></div>
      <div class="row big"><span></span><span>${rp(total)}</span></div>
      <div class="row"><span>Tunai</span><span>${rp(cash)}</span></div>
      <div class="row"><span>QRIS</span><span>${rp(qris)}</span></div>
      ${disc ? `<div class="row"><span>Diskon promo (🎁)</span><span>−${num(disc)}</span></div>` : ''}
      <div class="rule" style="border-color:#444"></div>
      ${Object.entries(perFlavor).map(([n,q])=>`<div class="row"><span>${n}</span><span>×${q}</span></div>`).join('')}
    </div>
    <button class="ghostbtn" id="testPrint">🖨 TES PRINT</button>`;

  if(!sales.length) html += `<div class="empty">Belum ada penjualan hari ini.<br>Transaksi pertama akan muncul di sini.</div>`;

  [...sales].reverse().forEach(s=>{
    const t = new Date(s.time).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
    html += `<div class="histcard">
      <div class="top"><span>#${s.id} · ${rp(s.total)}</span><span class="m">${t} · ${s.method}${s.promo?' · 🎁':''}${s.synced?' · ✓':''}</span></div>
      <ul>${s.items.map(it=>`<li>${it.name} ×${it.qty}</li>`).join('')}</ul>
      <button class="reprint" data-id="${s.id}">Cetak ulang</button>
    </div>`;
  });
  histWrap.innerHTML = html;

  document.getElementById('testPrint').addEventListener('click', ()=>{
    printSale({ id:'TES', time:new Date().toISOString(),
      items:[{name:'Tes Print', qty:1, price:0}], total:0, method:'TUNAI', cash:0, change:0 });
  });
  histWrap.querySelectorAll('.reprint').forEach(b=>{
    b.addEventListener('click', ()=>{
      const s = (store.get(todayKey())||[]).find(x=>x.id===b.dataset.id);
      if(s) printSale(s);
    });
  });
}

/* ---------- header + tabs ---------- */
function renderHeader(){
  const sales = store.get(todayKey()) || [];
  document.getElementById('hdrTotal').textContent = rp(sales.reduce((s,x)=>s+x.total,0));
}
const tabK = document.getElementById('tabKasir'), tabR = document.getElementById('tabRiwayat');
tabK.addEventListener('click', ()=>{ tabK.classList.add('on'); tabR.classList.remove('on');
  grid.style.display='grid'; histWrap.style.display='none'; document.getElementById('paybar').style.display='block'; });
tabR.addEventListener('click', ()=>{ tabR.classList.add('on'); tabK.classList.remove('on');
  grid.style.display='none'; histWrap.style.display='block'; document.getElementById('paybar').style.display='none';
  renderHistory(); });

/* ---------- toast ---------- */
let toastT;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove('show'), 2600);
}

/* ---------- init ---------- */
renderMenu(); renderPaybar(); renderHeader(); retryQueue();
</script>
